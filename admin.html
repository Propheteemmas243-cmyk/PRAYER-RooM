<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🔐 ADMIN LOGIN</h1>
</header>

<main>

  <section class="card" id="loginBox">
    <h2>Mot de passe admin</h2>
    <input type="password" id="password" placeholder="Entrer le mot de passe">
    <button onclick="checkPassword()">Connexion</button>
  </section>

  <section class="card" id="adminPanel" style="display:none;">
    <h2>⚙️ ADMIN PANEL</h2>

    <input id="versetInput" placeholder="Verset">
    <button onclick="updateVerset()">Enregistrer verset</button>

    <input id="losamboInput" placeholder="Losambo">
    <button onclick="updateLosambo()">Enregistrer losambo</button>

    <input id="liveInput" placeholder="Live">
    <button onclick="updateLive()">Enregistrer live</button>

  </section>

</main>

<script type="module" src="admin.js"></script>

</body>
</html>
