<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prayer RooM</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>PRAYER RooM</h1>
  <p>Daily Word • Prayer • Live</p>
</header>

<main>

  <section class="card">
    <h2>📖 Verset du jour</h2>
    <p id="verse">Chargement...</p>
  </section>

  <section class="card">
    <h2>🙏 Prière du jour</h2>
    <p id="prayer">Chargement...</p>
  </section>

  <section class="card live">
    <h2>🔴 Live</h2>
    <button onclick="openLive()">Rejoindre le live</button>
  </section>

  <section class="card">
    <h2>📝 Requêtes de prière</h2>
    <button>Envoyer une requête</button>
  </section>

  <section class="card">
    <h2>📚 Livre</h2>
    <button>Voir le livre</button>
  </section>

  <section class="card">
    <h2>💰 Soutien</h2>
    <button>Soutenir le ministère</button>
  </section>

</main>

<footer>
  <p>Prayer RooM © 2026</p>
</footer>

<script src="app.js"></script>
</body>
</html>
