<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prayer RooM</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>PRAYER RooM</h1>
  <p>Daily Word • Prayer • Live</p>
</header>

<main>

  <!-- 📖 VERSET -->
  <section class="card">
    <h2>📖 Verset du jour</h2>
    <p id="verse">Chargement...</p>
  </section>

  <!-- 🙏 LOSAMBO -->
  <section class="card">
    <h2>🙏 Losambo</h2>
    <p id="prayer">Chargement...</p>
  </section>

  <!-- 🔴 LIVE -->
  <section class="card">
    <h2>🔴 Live</h2>
    <button onclick="openLive()">Rejoindre le live</button>
  </section>

  <!-- 📝 REQUEST -->
  <section class="card">
    <h2>📝 Requêtes de prière</h2>
    <button onclick="openRequest()">Envoyer une requête</button>
  </section>

  <!-- 📚 BOOK -->
  <section class="card">
    <h2>📚 Espace Livre</h2>
    <button onclick="openBook()">Lire le livre</button>
  </section>

  <!-- 💰 SUPPORT -->
  <section class="card">
    <h2>💰 Soutenir le ministère</h2>
    <button onclick="openSupport()">Soutenir</button>
  </section>

</main>

<footer>
  <p>Prayer RooM © 2026</p>
</footer>

<script type="module" src="app.js"></script>

</body>
</html>
